<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Guardianes EHS - Ranking</title>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

  <style>
    :root{
      --bg:#07111f;
      --panel:#0d1828;
      --steel:#8793a3;
      --gold:#e5b83f;
      --text:#f4f7fb;
    }

    *{ box-sizing:border-box; }

    body{
      margin:0;
      min-height:100vh;
      background:
        radial-gradient(circle at 15% 20%, rgba(255,255,255,.08), transparent 18%),
        linear-gradient(135deg,#0b1220,#07101d 50%,#121a28);
      font-family:Arial, Helvetica, sans-serif;
      color:var(--text);
      display:flex;
      justify-content:center;
      padding:18px;
    }

    .board{
      width:min(980px,100%);
      background:linear-gradient(180deg,#101f36,#071120);
      border:5px solid #6f7a89;
      border-radius:10px;
      padding:18px;
      box-shadow:0 16px 50px rgba(0,0,0,.65), inset 0 0 0 2px rgba(255,255,255,.14);
      position:relative;
      overflow:hidden;
    }

    .board::before{
      content:"";
      position:absolute;
      inset:0;
      background-image:
        linear-gradient(rgba(255,255,255,.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.035) 1px, transparent 1px);
      background-size:20px 20px;
      pointer-events:none;
      opacity:.55;
    }

    .content{ position:relative; z-index:2; }

    .title-panel{
      background:linear-gradient(180deg,#1b4c94,#0d2a5a 65%,#071935);
      border:3px solid #aab8cb;
      border-radius:8px;
      text-align:center;
      padding:14px 8px 13px;
      box-shadow:inset 0 0 20px rgba(255,255,255,.22),0 4px 12px rgba(0,0,0,.35);
    }

    .title-panel h1{
      margin:0;
      color:#f1d56f;
      letter-spacing:11px;
      font-size:clamp(30px,5vw,54px);
      line-height:1;
      text-shadow:0 3px 0 #06101f,0 0 14px rgba(255,255,255,.25);
    }

    .title-panel h2{
      margin:10px 0 0;
      color:#fff;
      letter-spacing:10px;
      font-size:clamp(15px,2.5vw,28px);
      text-shadow:0 2px 0 #06101f;
    }

    .gauge-frame{
      width:min(700px,100%);
      margin:16px auto 12px;
      padding:10px;
      background:linear-gradient(180deg,#aeb8c4,#536170 48%,#1b2838 49%,#0d1726);
      border:3px solid #697585;
      border-radius:8px;
      box-shadow:inset 0 0 25px rgba(0,0,0,.55);
    }

    .gauge-box{
      height:220px;
      background:linear-gradient(180deg,#eff2f6,#c8ced6);
      border:3px solid #3f4954;
      border-radius:6px;
      overflow:hidden;
    }

    #gaugeCanvas{
      width:100%;
      height:100%;
      display:block;
    }

    .upload-bar{
      width:min(820px,100%);
      margin:10px auto 14px;
      padding:10px;
      display:flex;
      justify-content:center;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
      background:#0e1524;
      border:2px solid #8b96a6;
      border-radius:5px;
    }

    input[type="file"]{ max-width:330px; color:white; }

    select, button{
      border:0;
      border-radius:8px;
      padding:10px 16px;
      font-size:16px;
      font-weight:900;
    }

    select{
      background:#edf1f7;
      color:#0b1220;
      min-width:190px;
    }

    button{
      background:linear-gradient(180deg,#ffe37d,#d49e24);
      color:#101827;
      box-shadow:0 3px 0 #806019;
      cursor:pointer;
    }

    .indicators{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:10px;
      margin:12px 0 18px;
    }

    .indicator-card{
      min-height:65px;
      background:linear-gradient(180deg,#1d355c,#0b1830);
      border:2px solid #8fa1b8;
      border-radius:8px;
      text-align:center;
      padding:8px;
      box-shadow:inset 0 0 14px rgba(255,255,255,.08);
    }

    .indicator-card span{
      display:block;
      color:#dce5f3;
      font-size:13px;
      letter-spacing:1.2px;
      text-transform:uppercase;
      margin-bottom:5px;
    }

    .indicator-card strong{
      display:block;
      color:#ffe27a;
      font-size:clamp(20px,3vw,28px);
      text-shadow:0 2px 0 #000;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .ranking{
      display:grid;
      gap:9px;
    }

    .rank-row{
      display:grid;
      grid-template-columns:55px 70px 1fr 90px 120px;
      gap:10px;
      align-items:center;
      min-height:58px;
    }

    .position{
      width:46px;
      height:46px;
      border-radius:50%;
      border:3px solid rgba(255,255,255,.75);
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:25px;
      font-weight:900;
      color:white;
      text-shadow:0 2px 2px #000;
      justify-self:center;
      box-shadow:inset 0 2px 8px rgba(255,255,255,.35),0 2px 7px rgba(0,0,0,.65);
    }

    .rank-row:nth-child(1) .position{background:linear-gradient(180deg,#f5d140,#936707);}
    .rank-row:nth-child(2) .position{background:linear-gradient(180deg,#d7dce4,#697381);}
    .rank-row:nth-child(3) .position{background:linear-gradient(180deg,#d7863a,#713a16);}
    .rank-row:nth-child(4) .position{background:linear-gradient(180deg,#171717,#000);}
    .rank-row:nth-child(5) .position{background:linear-gradient(180deg,#35b85d,#0c662f);}
    .rank-row:nth-child(6) .position{background:linear-gradient(180deg,#ad4bc9,#602475);}
    .rank-row:nth-child(7) .position{background:linear-gradient(180deg,#30a5de,#075b8b);}
    .rank-row:nth-child(8) .position{background:linear-gradient(180deg,#5ebe83,#276e48);}

    .logo-box{
      height:54px;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .logo-box img{
      max-width:66px;
      max-height:58px;
      object-fit:contain;
      filter:drop-shadow(0 2px 4px rgba(0,0,0,.85));
    }

    .team-track{
      height:42px;
      border-radius:22px;
      background:linear-gradient(180deg,#677382,#283340 48%,#151c27 52%,#090f18);
      border:2px solid #99a5b5;
      box-shadow:inset 0 4px 10px rgba(0,0,0,.65),0 1px 4px rgba(255,255,255,.18);
      display:flex;
      align-items:center;
      padding:0 18px 0 58px;
      position:relative;
      overflow:hidden;
    }

    .progress-fill{
      position:absolute;
      left:0;
      top:0;
      bottom:0;
      width:0%;
      background:linear-gradient(90deg,rgba(25,168,75,.75),rgba(229,184,63,.7));
      border-radius:22px;
      transition:width 1s ease;
      opacity:.7;
    }

    .race-logo{
      position:absolute;
      top:50%;
      left:6px;
      width:44px;
      height:44px;
      object-fit:contain;
      transform:translateY(-50%);
      transition:left 1s ease;
      z-index:3;
      filter:drop-shadow(0 3px 5px rgba(0,0,0,.9));
    }

    .finish-line{
      position:absolute;
      right:8px;
      top:5px;
      bottom:5px;
      width:5px;
      background:repeating-linear-gradient(180deg,#fff 0 5px,#111 5px 10px);
      border-radius:4px;
      opacity:.9;
      z-index:2;
    }

    .team-name{
      position:relative;
      z-index:2;
      font-size:clamp(15px,2.2vw,24px);
      font-weight:900;
      letter-spacing:4px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      text-shadow:0 2px 2px #000;
    }

    .score-dark{
      height:42px;
      border-radius:14px;
      background:linear-gradient(180deg,#252d39,#080d16);
      border:2px solid #99a5b5;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:24px;
      font-weight:900;
    }

    .score-gold{
      height:42px;
      border-radius:14px;
      background:linear-gradient(180deg,#ffe58a,#d8a736 58%,#b8891f);
      color:#111827;
      border:2px solid #6c5119;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:24px;
      font-weight:900;
      box-shadow:inset 0 2px 8px rgba(255,255,255,.55);
    }

    .footer-labels{
      display:grid;
      grid-template-columns:55px 70px 1fr 90px 120px;
      gap:10px;
      margin-top:16px;
      align-items:center;
    }

    .footer-cell{
      background:linear-gradient(180deg,#1d355c,#0b1830);
      border:2px solid #99a5b5;
      min-height:42px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:22px;
      font-weight:900;
      letter-spacing:4px;
      text-shadow:0 2px 0 #000;
    }

    .team-footer{ grid-column:3 / 4; }
    .points-footer{ grid-column:5 / 6; }

    .status{
      margin-top:14px;
      text-align:center;
      color:#dfe7f4;
      font-size:15px;
    }

    .warning{
      color:#ffd36b;
      font-weight:800;
    }

    @media(max-width:760px){
      body{padding:8px;}
      .board{padding:10px;}
      .title-panel h1{letter-spacing:5px;}
      .title-panel h2{letter-spacing:4px;}
      .gauge-box{height:170px;}
      .indicators{grid-template-columns:repeat(2,1fr);}
      .rank-row,.footer-labels{grid-template-columns:38px 48px 1fr 58px 76px;gap:5px;}
      .position{width:34px;height:34px;font-size:18px;}
      .logo-box img{max-width:46px;max-height:42px;}
      .team-track,.score-dark,.score-gold{height:34px;}
      .team-track{padding-left:42px;}
      .race-logo{width:32px;height:32px;}
      .team-name{font-size:13px;letter-spacing:.8px;}
      .score-dark,.score-gold{font-size:15px;}
      .footer-cell{font-size:14px;letter-spacing:1px;min-height:34px;}
    }
  </style>
</head>

<body>
  <main class="board">
    <section class="content">
      <header class="title-panel">
        <h1>GUARDIANES EHS</h1>
        <h2>MARATÓN EHS</h2>
      </header>

      <section class="gauge-frame">
        <div class="gauge-box">
          <canvas id="gaugeCanvas" width="1000" height="300"></canvas>
        </div>
      </section>

      <section class="upload-bar">
        <input id="fileInput" type="file" accept=".xlsx,.xls,.csv" multiple />
        <select id="monthMode">
          <option value="last4">Últimos 4 meses</option>
          <option value="last2">Últimos 2 meses</option>
          <option value="first4">Primeros 4 meses</option>
          <option value="first2">Primeros 2 meses</option>
          <option value="all">Todo el archivo</option>
        </select>
        <button id="btnUpdate">Actualizar ranking</button>
      </section>

      <section class="indicators">
        <div class="indicator-card"><span>Meses leídos</span><strong id="kpiMonths">0</strong></div>
        <div class="indicator-card"><span>Equipo líder</span><strong id="kpiLeader">-</strong></div>
        <div class="indicator-card"><span>Puntos líder</span><strong id="kpiLeaderPoints">0</strong></div>
        <div class="indicator-card"><span>Avance líder</span><strong id="kpiPercent">0%</strong></div>
      </section>

      <section id="ranking" class="ranking"></section>

      <section class="footer-labels">
        <div class="footer-cell team-footer">EQUIPO</div>
        <div class="footer-cell points-footer">PUNTOS</div>
      </section>

      <div id="status" class="status">Carga un Excel o CSV para generar el ranking.</div>
    </section>
  </main>

  <script>
    const TEAMS = [
      { name:"1RX", logo:"logos/logo_1rx.png" },
      { name:"LOS CIENTIFICOS", logo:"logos/logo_los_cientificos.png" },
      { name:"CAI", logo:"logos/logo_cai.png" },
      { name:"CND", logo:"logos/logo_cnd.png" },
      { name:"LOS 20KG", logo:"logos/logo_los_20kg.png" },
      { name:"SOLVENTE", logo:"logos/logo_solvente.png" },
      { name:"WATER BASE", logo:"logos/logo_water_base.png" },
      { name:"CALIDAD", logo:"logos/logo_calidad.png" }
    ];

    let uploadedRows = [];

    function $(id){
      return document.getElementById(id);
    }

    function normalizeText(value){
      return String(value ?? "")
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g,"")
        .trim()
        .toUpperCase();
    }

    function cleanNumber(value){
      if(value === null || value === undefined || value === "") return 0;
      if(typeof value === "number") return value;

      let text = String(value).trim();

      if(text.includes(",") && text.includes(".")){
        text = text.replace(/\./g,"").replace(",",".");
      }else if(text.includes(",")){
        text = text.replace(",",".");
      }

      text = text.replace(/[^0-9.-]/g,"");
      const number = Number(text);
      return Number.isFinite(number) ? number : 0;
    }

    function formatPoints(value){
      return Math.round(value || 0).toLocaleString("es-EC");
    }

    function inferTeamFromText(text){
      const value = normalizeText(text);
      const aliases = [
        { name:"1RX", keys:["1RX","RX","MANTENIMIENTO","MAINTENANCE"] },
        { name:"LOS CIENTIFICOS", keys:["LOS CIENTIFICOS","CIENTIFICOS","AREA TECNICA","TECNICA"] },
        { name:"CAI", keys:["CAI"] },
        { name:"CND", keys:["CND"] },
        { name:"LOS 20KG", keys:["LOS 20KG","20KG","20 KG"] },
        { name:"SOLVENTE", keys:["SOLVENTE","SOLVENT","SOLVENTE UNITED"] },
        { name:"WATER BASE", keys:["WATER BASE","H2O","AGUA","BASE AGUA"] },
        { name:"CALIDAD", keys:["CALIDAD","QUALITY"] }
      ];

      const found = aliases.find(item => item.keys.some(key => value.includes(normalizeText(key))));
      return found ? found.name : "";
    }

    function teamCanonical(value){
      const detected = inferTeamFromText(value);
      if(detected) return detected;

      const norm = normalizeText(value);
      const exact = TEAMS.find(team => normalizeText(team.name) === norm);
      return exact ? exact.name : norm;
    }

    function inferMonthFromText(text){
      const raw = normalizeText(text);
      const months = [
        "ENERO","FEBRERO","MARZO","ABRIL","MAYO","JUNIO",
        "JULIO","AGOSTO","SEPTIEMBRE","OCTUBRE","NOVIEMBRE","DICIEMBRE"
      ];
      const foundMonth = months.find(month => raw.includes(month));
      const yearMatch = raw.match(/20[0-9]{2}/);
      const year = yearMatch ? yearMatch[0] : "";

      if(foundMonth) return year ? `${foundMonth} ${year}` : foundMonth;

      const dateMatch = raw.match(/([0-9]{1,2})[-/ ]([0-9]{1,2})[-/ ](20[0-9]{2})/);
      if(dateMatch){
        return `${dateMatch[3]}-${String(dateMatch[2]).padStart(2,"0")}`;
      }

      return "";
    }

    function parseMonth(value){
      if(value === null || value === undefined || value === "") return "SIN MES";

      if(value instanceof Date && !isNaN(value)){
        return `${value.getFullYear()}-${String(value.getMonth()+1).padStart(2,"0")}`;
      }

      if(typeof value === "number" && XLSX && XLSX.SSF){
        const parsed = XLSX.SSF.parse_date_code(value);
        if(parsed) return `${parsed.y}-${String(parsed.m).padStart(2,"0")}`;
      }

      const detected = inferMonthFromText(value);
      return detected || normalizeText(value) || "SIN MES";
    }

    function findColumn(row, aliases){
      const keys = Object.keys(row);
      for(const alias of aliases){
        const target = normalizeText(alias);
        const found = keys.find(key => normalizeText(key).includes(target));
        if(found) return found;
      }
      return null;
    }

    function mapRows(rawRows){
      return rawRows.map(row => {
        const teamCol = findColumn(row, ["equipo","grupo","team","area","nombre del equipo"]);
        const monthCol = findColumn(row, ["mes","month","fecha","periodo"]);
        const pointCol = findColumn(row, ["p obtenido","puntos obtenidos","puntaje","puntos","score","total"]);
        const maxCol = findColumn(row, ["maximo","máximo","p maximo","puntos maximos","meta"]);

        return {
          team: teamCanonical(teamCol ? row[teamCol] : ""),
          month: parseMonth(monthCol ? row[monthCol] : "SIN MES"),
          points: cleanNumber(pointCol ? row[pointCol] : 0),
          max: cleanNumber(maxCol ? row[maxCol] : 1200) || 1200
        };
      }).filter(row => TEAMS.some(team => normalizeText(team.name) === normalizeText(row.team)) && row.points > 0);
    }

    function csvTextToMatrix(text){
      const delimiter = text.includes(";") ? ";" : ",";
      return text
        .replace(/^\uFEFF/,"")
        .split(/\r?\n/)
        .filter(line => line.trim() !== "")
        .map(line => line.split(delimiter).map(cell => {
          let value = String(cell ?? "").trim();
          if(value.startsWith('"') && value.endsWith('"')){
            value = value.slice(1,-1);
          }
          return value.replace(/""/g,'"').trim();
        }));
    }

    function getCell(matrix, row, col){
      return (matrix[row] && matrix[row][col] !== undefined) ? matrix[row][col] : "";
    }

    function nearbyCells(matrix, row, col, down, right){
      const values = [];

      for(let r = row; r <= Math.min(row + down, matrix.length - 1); r++){
        const startCol = r === row ? col + 1 : Math.max(0, col - 1);
        const endCol = Math.min(col + right, (matrix[r] || []).length - 1);

        for(let c = startCol; c <= endCol; c++){
          values.push(getCell(matrix,r,c));
        }
      }

      return values;
    }

    function findNearbyValue(matrix, row, col){
      const values = nearbyCells(matrix,row,col,3,8);
      return values.find(value => String(value ?? "").trim() !== "") || "";
    }

    function findNearbyNumber(matrix, row, col){
      const values = nearbyCells(matrix,row,col,4,10);
      const found = values.find(value => cleanNumber(value) > 0);
      return found !== undefined ? cleanNumber(found) : 0;
    }

    function scanMessySheet(matrix, sheetName, fileName){
      const rows = [];
      const flatText = [sheetName, fileName].concat(matrix.flat()).join(" ");

      let currentTeam = inferTeamFromText(flatText);
      let currentMonth = inferMonthFromText(flatText);
      let currentMax = 1200;

      for(let r = 0; r < matrix.length; r++){
        for(let c = 0; c < (matrix[r] || []).length; c++){
          const cell = getCell(matrix,r,c);
          const norm = normalizeText(cell);

          const teamInCell = inferTeamFromText(cell);
          if(teamInCell) currentTeam = teamInCell;

          const monthInCell = inferMonthFromText(cell);
          if(monthInCell) currentMonth = monthInCell;

          if(norm.includes("NOMBRE DEL EQUIPO") || norm === "EQUIPO" || norm.includes("GRUPO")){
            const foundTeam = inferTeamFromText(findNearbyValue(matrix,r,c));
            if(foundTeam) currentTeam = foundTeam;
          }

          if(norm.includes("MES") || norm.includes("PERIODO") || norm.includes("FECHA")){
            const foundMonth = inferMonthFromText(String(cell) + " " + String(findNearbyValue(matrix,r,c)));
            if(foundMonth) currentMonth = foundMonth;
          }

          if(norm.includes("MAXIMO") || norm.includes("META")){
            const foundMax = findNearbyNumber(matrix,r,c);
            if(foundMax > 0) currentMax = foundMax;
          }
        }
      }

      for(let r = 0; r < matrix.length; r++){
        for(let c = 0; c < (matrix[r] || []).length; c++){
          const cell = getCell(matrix,r,c);
          const norm = normalizeText(cell);

          const isPointsLabel =
            norm.includes("P OBTENIDO") ||
            norm.includes("PUNTOS OBTENIDOS") ||
            norm === "PUNTOS" ||
            norm === "PUNTAJE";

          if(isPointsLabel){
            const points = findNearbyNumber(matrix,r,c);
            if(points > 0 && currentTeam){
              rows.push({
                team: currentTeam,
                month: currentMonth || normalizeText(sheetName) || "SIN MES",
                points: points,
                max: currentMax || 1200
              });
            }
          }
        }
      }

      if(rows.length === 0 && currentTeam){
        for(let r = 0; r < matrix.length; r++){
          for(let c = 0; c < (matrix[r] || []).length; c++){
            const norm = normalizeText(getCell(matrix,r,c));
            if(norm === "TOTAL"){
              const rowNumbers = (matrix[r] || []).map(cleanNumber).filter(number => number > 0);
              const points = rowNumbers.length ? Math.max(...rowNumbers) : 0;
              if(points > 0){
                rows.push({
                  team: currentTeam,
                  month: currentMonth || normalizeText(sheetName) || "SIN MES",
                  points: points,
                  max: currentMax || 1200
                });
              }
            }
          }
        }
      }

      return rows.filter(row => TEAMS.some(team => normalizeText(team.name) === normalizeText(row.team)));
    }

    async function readFile(file){
      const extension = file.name.split(".").pop().toLowerCase();
      const structuredRows = [];
      const scannedRows = [];

      if(extension === "csv"){
        const buffer = await file.arrayBuffer();
        let text = new TextDecoder("utf-8").decode(buffer);

        if(text.includes("�") || !normalizeText(text).includes("P OBTENIDO")){
          text = new TextDecoder("windows-1252").decode(buffer);
        }

        const matrix = csvTextToMatrix(text);
        scannedRows.push(...scanMessySheet(matrix,file.name,file.name));

        try{
          const workbookCsv = XLSX.read(text,{ type:"string", raw:false });
          workbookCsv.SheetNames.forEach(sheetName => {
            const sheet = workbookCsv.Sheets[sheetName];
            const tableRows = XLSX.utils.sheet_to_json(sheet,{ defval:"", raw:false });
            structuredRows.push(...mapRows(tableRows));
          });
        }catch(error){
          console.warn("No se pudo leer el CSV como tabla, se usó escaneo:", error);
        }
      }else{
        const data = await file.arrayBuffer();
        const workbook = XLSX.read(data,{ type:"array", cellDates:true, raw:false });

        workbook.SheetNames.forEach(sheetName => {
          const sheet = workbook.Sheets[sheetName];

          const tableRows = XLSX.utils.sheet_to_json(sheet,{ defval:"", raw:false });
          structuredRows.push(...mapRows(tableRows));

          const matrix = XLSX.utils.sheet_to_json(sheet,{ header:1, defval:"", raw:false });
          scannedRows.push(...scanMessySheet(matrix,sheetName,file.name));
        });
      }

      const finalRows = structuredRows.length > 0 ? structuredRows : scannedRows;

      console.log("Archivo leído:", file.name);
      console.table(finalRows);

      return finalRows;
    }

    function selectedRowsByMonth(rows){
      const mode = $("monthMode").value;
      if(mode === "all") return rows;

      const months = [...new Set(rows.map(row => row.month))]
        .filter(month => month && month !== "SIN MES")
        .sort((a,b) => String(a).localeCompare(String(b),"es",{numeric:true}));

      if(months.length === 0) return rows;

      let selected;
      if(mode === "first4") selected = months.slice(0,4);
      else if(mode === "first2") selected = months.slice(0,2);
      else if(mode === "last2") selected = months.slice(-2);
      else selected = months.slice(-4);

      return rows.filter(row => selected.includes(row.month));
    }

    function calculateRanking(){
      const selected = selectedRowsByMonth(uploadedRows);
      const totals = new Map();

      TEAMS.forEach(team => {
        totals.set(team.name,{ ...team, points:0, max:1200 });
      });

      selected.forEach(row => {
        const item = totals.get(row.team);
        if(!item) return;

        item.points += row.points || 0;
        item.max += row.max || 1200;
      });

      return [...totals.values()]
        .sort((a,b) => b.points - a.points || a.name.localeCompare(b.name))
        .slice(0,8);
    }

    function renderRanking(data){
      const ranking = $("ranking");
      ranking.innerHTML = "";

      const raceMax = Math.max(1,...data.map(item => item.points || 0));

      data.forEach((team,index) => {
        const progress = Math.max(0,Math.min(100,((team.points || 0) / raceMax) * 100));
        const logoLeft = Math.max(6,Math.min(86,progress * 0.86));

        const row = document.createElement("article");
        row.className = "rank-row";
        row.innerHTML = `
          <div class="position">${index + 1}</div>
          <div class="logo-box">
            <img src="${team.logo}" alt="${team.name}" onerror="this.style.display='none'">
          </div>
          <div class="team-track">
            <div class="progress-fill" style="width:${progress}%"></div>
            <img class="race-logo" src="${team.logo}" alt="${team.name}" style="left:${logoLeft}%" onerror="this.style.display='none'">
            <span class="team-name">${team.name}</span>
            <div class="finish-line"></div>
          </div>
          <div class="score-dark">0</div>
          <div class="score-gold">${formatPoints(team.points || 0)}</div>
        `;

        ranking.appendChild(row);
      });
    }

    function drawGauge(value,maxValue){
      const canvas = $("gaugeCanvas");
      const ctx = canvas.getContext("2d");
      const width = canvas.width;
      const height = canvas.height;

      ctx.clearRect(0,0,width,height);

      const cx = width / 2;
      const cy = height - 25;
      const rx = width * 0.42;
      const ry = height * 0.78;
      const pct = Math.max(0,Math.min(1,maxValue > 0 ? value / maxValue : 0));

      function drawBand(startPercent,endPercent,outerRx,outerRy,innerRx,innerRy,color){
        const start = Math.PI - Math.PI * startPercent / 100;
        const end = Math.PI - Math.PI * endPercent / 100;

        ctx.beginPath();

        for(let i = 0; i <= 90; i++){
          const angle = start + (end - start) * i / 90;
          const x = cx + Math.cos(angle) * outerRx;
          const y = cy - Math.sin(angle) * outerRy;
          if(i === 0) ctx.moveTo(x,y);
          else ctx.lineTo(x,y);
        }

        for(let i = 90; i >= 0; i--){
          const angle = start + (end - start) * i / 90;
          const x = cx + Math.cos(angle) * innerRx;
          const y = cy - Math.sin(angle) * innerRy;
          ctx.lineTo(x,y);
        }

        ctx.closePath();
        ctx.fillStyle = color;
        ctx.fill();
      }

      drawBand(0,100,rx+25,ry+25,rx-125,ry-82,"#dce1e8");
      ctx.strokeStyle = "#4a5563";
      ctx.lineWidth = 5;
      ctx.stroke();

      drawBand(0,58,rx,ry,rx-90,ry-55,"#159844");
      drawBand(58,82,rx,ry,rx-90,ry-55,"#d6c92b");
      drawBand(82,100,rx,ry,rx-90,ry-55,"#c12a23");

      for(let i = 0; i <= 100; i += 2){
        const angle = Math.PI - Math.PI * i / 100;
        const major = i % 10 === 0;

        const x1 = cx + Math.cos(angle) * (rx - 8);
        const y1 = cy - Math.sin(angle) * (ry - 8);
        const x2 = cx + Math.cos(angle) * (rx - (major ? 42 : 27));
        const y2 = cy - Math.sin(angle) * (ry - (major ? 30 : 19));

        ctx.beginPath();
        ctx.moveTo(x1,y1);
        ctx.lineTo(x2,y2);
        ctx.strokeStyle = "rgba(15,23,42,.82)";
        ctx.lineWidth = major ? 3 : 1.2;
        ctx.stroke();
      }

      const labels = [
        { text:"0", p:10 },
        { text:"600", p:50 },
        { text:"1200", p:90 }
      ];

      labels.forEach(label => {
        const angle = Math.PI - Math.PI * label.p / 100;
        const x = cx + Math.cos(angle) * (rx - 130);
        const y = cy - Math.sin(angle) * (ry - 80);

        ctx.fillStyle = "#111827";
        ctx.font = "900 34px Arial";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText(label.text,x,y);
      });

      ctx.fillStyle = "#111827";
      ctx.font = "900 56px Arial";
      ctx.textAlign = "center";
      ctx.fillText(formatPoints(value),cx,cy-95);

      const needleAngle = Math.PI - Math.PI * pct;
      const nx = cx + Math.cos(needleAngle) * (rx - 75);
      const ny = cy - Math.sin(needleAngle) * (ry - 50);

      ctx.beginPath();
      ctx.moveTo(cx,cy);
      ctx.lineTo(nx,ny);
      ctx.strokeStyle = "#d22121";
      ctx.lineWidth = 9;
      ctx.lineCap = "round";
      ctx.stroke();

      ctx.beginPath();
      ctx.arc(cx,cy,18,0,Math.PI * 2);
      ctx.fillStyle = "#27364a";
      ctx.fill();
      ctx.strokeStyle = "#e5e7eb";
      ctx.lineWidth = 4;
      ctx.stroke();
    }

    function updateDashboard(){
      const data = calculateRanking();
      renderRanking(data);

      const selected = selectedRowsByMonth(uploadedRows);
      const months = [...new Set(selected.map(row => row.month))].filter(Boolean);

      const leader = data[0] || { name:"-", points:0, max:1200 };
      const maxForGauge = Math.max(1200,leader.max || 1200,leader.points || 0);
      const percent = maxForGauge > 0 ? Math.min(100,(leader.points / maxForGauge) * 100) : 0;

      $("kpiMonths").textContent = months.length;
      $("kpiLeader").textContent = leader.points > 0 ? leader.name : "-";
      $("kpiLeaderPoints").textContent = formatPoints(leader.points || 0);
      $("kpiPercent").textContent = `${percent.toFixed(1)}%`;

      drawGauge(leader.points || 0,maxForGauge);

      if(uploadedRows.length){
        $("status").innerHTML = `Registros detectados: <b>${uploadedRows.length}</b>. Meses considerados: <b>${months.join(", ") || "sin mes"}</b>.`;
      }else{
        $("status").innerHTML = `<span class="warning">No hay datos cargados. Revisa que el archivo tenga datos de equipo, mes y puntos.</span>`;
      }
    }

    $("fileInput").addEventListener("change",async function(event){
      uploadedRows = [];
      const files = Array.from(event.target.files || []);

      for(const file of files){
        try{
          const rows = await readFile(file);
          uploadedRows.push(...rows);
        }catch(error){
          console.error("Error leyendo archivo:",file.name,error);
          $("status").innerHTML = `<span class="warning">No se pudo leer ${file.name}. Revisa la consola.</span>`;
        }
      }

      updateDashboard();
    });

    $("btnUpdate").addEventListener("click",updateDashboard);
    $("monthMode").addEventListener("change",updateDashboard);

    renderRanking(TEAMS.map(team => ({ ...team, points:0, max:1200 })));
    drawGauge(0,1200);
  </script>
</body>
</html>
