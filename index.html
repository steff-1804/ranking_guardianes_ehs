<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Guardianes EHS - Ranking</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      background: radial-gradient(circle at top, #18345a 0%, #07111f 55%, #020711 100%);
      color: white;
    }
    .contenedor {
      width: 100%;
      min-height: 100vh;
      padding: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .panel {
      width: 100%;
      max-width: 950px;
      background: linear-gradient(180deg, #07162c, #020914);
      border: 4px solid #253a5a;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 0 35px rgba(0,0,0,.85), inset 0 0 25px rgba(80,130,200,.25);
    }
    .encabezado {
      text-align: center;
      padding: 16px;
      border: 2px solid #7fa8df;
      border-radius: 12px;
      background: linear-gradient(180deg, #173e75, #061a39);
      box-shadow: inset 0 0 18px rgba(173,216,255,.35);
    }
    .encabezado h1 {
      margin: 0;
      font-size: clamp(26px, 5vw, 46px);
      letter-spacing: 7px;
      color: #f5d86d;
      text-shadow: 0 3px 5px black;
    }
    .encabezado h2 {
      margin: 6px 0 0;
      font-size: clamp(17px, 3vw, 28px);
      letter-spacing: 5px;
      color: #fff;
      text-shadow: 0 3px 5px black;
    }
    .medidor { display: flex; justify-content: center; margin: 25px 0 15px; }
    .gauge {
      width: min(390px, 90vw);
      height: 180px;
      position: relative;
      overflow: hidden;
      border-radius: 220px 220px 0 0;
      background: conic-gradient(from 270deg, #39e34a 0deg, #b6ff2f 45deg, #ffdf31 75deg, #ff3228 105deg, #151515 140deg, #151515 180deg);
      border: 8px solid #b8c0d5;
    }
    .gauge::after {
      content: "";
      position: absolute;
      width: 70%;
      height: 70%;
      background: #e8e8e8;
      border-radius: 180px 180px 0 0;
      left: 15%;
      bottom: 0;
    }
    .aguja {
      width: 6px;
      height: 125px;
      background: #e92323;
      position: absolute;
      left: 50%;
      bottom: 15px;
      transform-origin: bottom center;
      transform: rotate(-60deg);
      z-index: 3;
      border-radius: 5px;
      box-shadow: 0 0 6px black;
      transition: transform .7s ease;
    }
    .centro {
      width: 26px;
      height: 26px;
      background: #222;
      position: absolute;
      left: calc(50% - 13px);
      bottom: 4px;
      border-radius: 50%;
      z-index: 4;
    }
    .zona-carga {
      display: grid;
      grid-template-columns: 1fr 180px 185px;
      gap: 12px;
      align-items: center;
      padding: 12px;
      margin-bottom: 15px;
      border: 2px solid #31496d;
      border-radius: 10px;
      background: #080d1b;
    }
    .zona-carga input,
    .zona-carga select {
      color: white;
      background: #111827;
      border: 1px solid #5f7397;
      padding: 10px;
      border-radius: 7px;
      width: 100%;
    }
    .zona-carga button {
      border: none;
      background: linear-gradient(180deg, #ffe275, #c79522);
      color: #111;
      font-weight: 900;
      padding: 11px 18px;
      border-radius: 8px;
      cursor: pointer;
      text-transform: uppercase;
      box-shadow: 0 3px 0 #72510d;
    }
    .zona-carga button:hover { filter: brightness(1.1); }
    .info {
      text-align: center;
      font-size: 14px;
      color: #d8e4ff;
      margin-bottom: 18px;
      line-height: 1.5;
    }
    .meta { color: #f5d86d; font-weight: bold; }
    .ranking { display: flex; flex-direction: column; gap: 12px; }
    .fila-ranking {
      display: grid;
      grid-template-columns: 55px 64px 1fr 95px 95px;
      gap: 10px;
      align-items: center;
    }
    .posicion {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #202a3b;
      border: 3px solid white;
      font-size: 23px;
      font-weight: bold;
      box-shadow: inset 0 0 8px black;
    }
    .posicion-1 { background: #c79a1a; }
    .posicion-2 { background: #9ea3ad; }
    .posicion-3 { background: #a96324; }
    .avatar {
      width: 58px;
      height: 58px;
      border-radius: 50%;
      background: transparent;
      display: flex;
      justify-content: center;
      align-items: center;
      border: 2px solid rgba(144,164,199,.65);
      box-shadow: 0 0 10px rgba(0,0,0,.55), inset 0 0 8px rgba(255,255,255,.25);
      overflow: hidden;
    }
    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }
    .nombre-equipo {
      min-height: 50px;
      background: linear-gradient(180deg, #1b2738, #08111f);
      border: 2px solid #6c7e9e;
      border-radius: 18px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 6px 18px;
      font-weight: bold;
      text-transform: uppercase;
      box-shadow: inset 0 0 10px black;
    }
    .nombre-equipo span { font-size: 17px; }
    .nombre-equipo small {
      font-size: 11px;
      color: #aebfda;
      margin-top: 3px;
      text-transform: none;
      font-weight: normal;
    }
    .puntos,
    .adicionales {
      min-height: 44px;
      border-radius: 14px;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 21px;
      font-weight: 900;
    }
    .puntos {
      background: #050914;
      border: 2px solid #6c7e9e;
    }
    .adicionales {
      background: linear-gradient(180deg, #ffe178, #c99625);
      color: #111;
      box-shadow: inset 0 0 6px #fff3a0;
    }
    .sin-datos {
      text-align: center;
      padding: 35px;
      color: #b8c8e8;
      border: 2px dashed #4c6388;
      border-radius: 10px;
    }
    .footer-tabla {
      margin-top: 38px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      border: 2px solid #8ea1c8;
      border-radius: 6px;
      padding: 14px;
      text-align: center;
      font-weight: 900;
      letter-spacing: 2px;
      background: #060d1d;
    }
    @media (max-width: 760px) {
      .panel { padding: 15px; }
      .encabezado h1 { letter-spacing: 3px; }
      .encabezado h2 { letter-spacing: 2px; }
      .zona-carga { grid-template-columns: 1fr; }
      .fila-ranking {
        grid-template-columns: 42px 50px 1fr;
        grid-template-areas:
          "pos avatar equipo"
          "pos puntos adicionales";
        gap: 8px;
        padding-bottom: 10px;
        border-bottom: 1px solid #293d5e;
      }
      .posicion { grid-area: pos; width: 38px; height: 38px; font-size: 19px; }
      .avatar { grid-area: avatar; width: 46px; height: 46px; }
      .nombre-equipo { grid-area: equipo; }
      .nombre-equipo span { font-size: 14px; }
      .puntos { grid-area: puntos; min-height: 36px; font-size: 16px; }
      .adicionales { grid-area: adicionales; min-height: 36px; font-size: 16px; }
    }
  </style>
</head>
<body>
  <main class="contenedor">
    <section class="panel">
      <header class="encabezado">
        <h1>GUARDIANES EHS</h1>
        <h2>MARATÓN EHS</h2>
      </header>

      <section class="medidor">
        <div class="gauge">
          <div class="aguja" id="aguja"></div>
          <div class="centro"></div>
        </div>
      </section>

      <section class="zona-carga">
        <input type="file" id="archivoExcel" accept=".xlsx,.xls" multiple />
        <select id="cantidadMeses" onchange="actualizarMetaVisual()">
          <option value="1">1 mes</option>
          <option value="2">2 meses</option>
          <option value="3">3 meses</option>
          <option value="4" selected>4 meses</option>
          <option value="5">5 meses</option>
          <option value="6">6 meses</option>
          <option value="7">7 meses</option>
          <option value="8">8 meses</option>
          <option value="9">9 meses</option>
          <option value="10">10 meses</option>
          <option value="11">11 meses</option>
          <option value="12">12 meses</option>
        </select>
        <button onclick="procesarExcels()">Actualizar ranking</button>
      </section>

      <div class="info">
        Lectura desde <strong>FEBRERO</strong>. Meta ranking: <span class="meta" id="metaTexto">400 puntos</span>.<br />
        El sistema busca por cada hoja los textos <strong>P Obtenido / Puntaje Obtenido</strong> y <strong>Puntos adicionales</strong>; luego suma ambos valores.
      </div>

      <section class="ranking" id="ranking">
        <div class="sin-datos">Sube uno o varios archivos Excel para generar el ranking.</div>
      </section>

      <footer class="footer-tabla">
        <div>EQUIPO</div>
        <div>PUNTOS</div>
      </footer>
    </section>
  </main>

  <script>
    const MESES_ORDEN = ["ENE", "FEB", "MAR", "ABR", "MAY", "JUN", "JUL", "AGO", "SEP", "OCT", "NOV", "DIC"];
    const MES_INICIAL = "FEB";

    const LOGOS_EQUIPO = {
      "1RX": "logos/1rx.png",
      "LOS CIENTIFICOS": "logos/los-cientificos.png",
      "LOS CIENTÍFICOS": "logos/los-cientificos.png",
      "CAI": "logos/cai.png",
      "CND": "logos/cnd.png",
      "LOS 20KG": "logos/los-20kg.png",
      "20KG": "logos/los-20kg.png",
      "SOLVENTE": "logos/solvente.png",
      "WATER BASE": "logos/water-base.png",
      "CALIDAD": "logos/calidad.png"
    };

    function normalizarTexto(valor) {
      if (valor === null || valor === undefined) return "";
      return String(valor).trim().toUpperCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/\s+/g, " ");
    }

    function redondear(numero) {
      return Math.round((Number(numero) + Number.EPSILON) * 100) / 100;
    }

    function limpiarNombreArchivo(nombreArchivo) {
      return nombreArchivo.replace(/\.[^/.]+$/, "").replace(/[_-]/g, " ").trim().toUpperCase();
    }

    function obtenerNumero(valor) {
      if (valor === null || valor === undefined || valor === "") return 0;
      if (typeof valor === "number") return valor;

      const texto = String(valor).replace(",", ".");
      const match = texto.match(/-?\d+(\.\d+)?/);

      return match ? parseFloat(match[0]) : 0;
    }

    function esNumeroValido(valor) {
      if (valor === null || valor === undefined || valor === "") return false;
      if (typeof valor === "number") return Number.isFinite(valor);

      const texto = String(valor).trim().replace(",", ".");

      // Evita tomar textos largos de instrucciones como si fueran puntos.
      return /^-?\d+(\.\d+)?%?$/.test(texto);
    }

    function obtenerLogoEquipo(nombreEquipo) {
      const clave = normalizarTexto(nombreEquipo);
      return LOGOS_EQUIPO[clave] || "logos/default.png";
    }

    function buscarNumeroDerecha(matriz, fila, columna, maxColumnas = 8) {
      const totalColumnas = matriz[fila]?.length || 0;

      for (let c = columna + 1; c < Math.min(columna + maxColumnas + 1, totalColumnas); c++) {
        const valor = matriz[fila][c];

        if (esNumeroValido(valor)) {
          return obtenerNumero(valor);
        }
      }

      return 0;
    }

    function buscarNumeroCerca(matriz, fila, columna, opciones = {}) {
      const totalFilas = matriz.length;
      const filasAntes = opciones.filasAntes ?? 1;
      const filasDespues = opciones.filasDespues ?? 2;
      const columnasAntes = opciones.columnasAntes ?? 5;
      const columnasDespues = opciones.columnasDespues ?? 5;

      // Primero revisa la misma fila, porque en tu formato el valor está al lado.
      const mismaFila = matriz[fila] || [];
      for (let c = Math.max(0, columna - columnasAntes); c < Math.min(columna + columnasDespues + 1, mismaFila.length); c++) {
        if (c === columna) continue;
        const valor = mismaFila[c];
        if (esNumeroValido(valor)) return obtenerNumero(valor);
      }

      // Luego revisa un área pequeña alrededor de la etiqueta.
      for (let f = Math.max(0, fila - filasAntes); f < Math.min(fila + filasDespues + 1, totalFilas); f++) {
        if (f === fila) continue;
        const totalColumnas = matriz[f]?.length || 0;

        for (let c = Math.max(0, columna - columnasAntes); c < Math.min(columna + columnasDespues + 1, totalColumnas); c++) {
          const valor = matriz[f][c];
          if (esNumeroValido(valor)) return obtenerNumero(valor);
        }
      }

      return 0;
    }

    function extraerPuntajeDeHoja(matriz) {
      let pObtenido = 0;
      let puntosAdicionales = 0;
      let encontroPObtenido = false;
      let encontroAdicionales = false;

      for (let fila = 0; fila < matriz.length; fila++) {
        const columnas = matriz[fila] || [];

        for (let columna = 0; columna < columnas.length; columna++) {
          const texto = normalizarTexto(columnas[columna]);

          if (!texto) continue;

          const esPObtenido =
            texto.includes("P OBTENIDO") ||
            texto.includes("P. OBTENIDO") ||
            texto.includes("P OBTENIDOS") ||
            texto.includes("PUNTOS OBTENIDOS") ||
            texto.includes("PUNTAJE OBTENIDO") ||
            texto.includes("PUNTAJE OBTENIDOS");

          const esPuntosAdicionales =
            texto.includes("PUNTOS ADICIONALES") ||
            texto.includes("PUNTO ADICIONAL") ||
            texto.includes("P ADICIONALES") ||
            texto.includes("P. ADICIONALES");

          if (esPObtenido && !encontroPObtenido) {
            // Para P Obtenido normalmente el valor está a la derecha.
            let numero = buscarNumeroDerecha(matriz, fila, columna, 8);

            // Respaldo por si el Excel cambia y el número queda cercano.
            if (numero === 0) {
              numero = buscarNumeroCerca(matriz, fila, columna, {
                filasAntes: 1,
                filasDespues: 1,
                columnasAntes: 2,
                columnasDespues: 8
              });
            }

            pObtenido = numero;
            encontroPObtenido = true;
          }

          if (esPuntosAdicionales && !encontroAdicionales) {
            // En tu archivo el texto "Puntos adicionales" está a la derecha del número.
            // Por eso se busca en la misma fila tanto a la izquierda como a la derecha.
            const numero = buscarNumeroCerca(matriz, fila, columna, {
              filasAntes: 1,
              filasDespues: 1,
              columnasAntes: 6,
              columnasDespues: 3
            });

            puntosAdicionales = numero;
            encontroAdicionales = true;
          }
        }
      }

      return {
        pObtenido,
        puntosAdicionales,
        total: pObtenido + puntosAdicionales,
        encontroPObtenido,
        encontroAdicionales
      };
    }

    function obtenerMesesAProcesar() {
      const cantidad = Number(document.getElementById("cantidadMeses").value);
      const indiceInicio = MESES_ORDEN.indexOf(MES_INICIAL);
      return MESES_ORDEN.slice(indiceInicio, indiceInicio + cantidad);
    }

    function detectarMesDeHoja(nombreHoja) {
      const hoja = normalizarTexto(nombreHoja);
      if (hoja.includes("ENERO") || hoja === "ENE" || hoja.includes("ENE")) return "ENE";
      if (hoja.includes("FEBRERO") || hoja === "FEB" || hoja.includes("FEB")) return "FEB";
      if (hoja.includes("MARZO") || hoja === "MAR" || hoja.includes("MAR")) return "MAR";
      if (hoja.includes("ABRIL") || hoja === "ABR" || hoja.includes("ABR")) return "ABR";
      if (hoja.includes("MAYO") || hoja === "MAY" || hoja.includes("MAY")) return "MAY";
      if (hoja.includes("JUNIO") || hoja === "JUN" || hoja.includes("JUN")) return "JUN";
      if (hoja.includes("JULIO") || hoja === "JUL" || hoja.includes("JUL")) return "JUL";
      if (hoja.includes("AGOSTO") || hoja === "AGO" || hoja.includes("AGO")) return "AGO";
      if (hoja.includes("SEPTIEMBRE") || hoja === "SEP" || hoja.includes("SEP")) return "SEP";
      if (hoja.includes("OCTUBRE") || hoja === "OCT" || hoja.includes("OCT")) return "OCT";
      if (hoja.includes("NOVIEMBRE") || hoja === "NOV" || hoja.includes("NOV")) return "NOV";
      if (hoja.includes("DICIEMBRE") || hoja === "DIC" || hoja.includes("DIC")) return "DIC";
      return null;
    }

    function obtenerHojasValidas(workbook) {
      const mesesAProcesar = obtenerMesesAProcesar();
      return workbook.SheetNames.filter(nombreHoja => {
        const mes = detectarMesDeHoja(nombreHoja);
        return mes && mesesAProcesar.includes(mes);
      });
    }

    async function leerArchivoExcel(archivo) {
      return new Promise((resolve, reject) => {
        const lector = new FileReader();
        lector.onload = function(evento) {
          try {
            const datos = new Uint8Array(evento.target.result);
            const workbook = XLSX.read(datos, { type: "array" });
            const hojasValidas = obtenerHojasValidas(workbook);

            let totalPObtenido = 0;
            let totalAdicionales = 0;
            let mesesLeidos = [];

            hojasValidas.forEach(nombreHoja => {
              const hoja = workbook.Sheets[nombreHoja];
              const matriz = XLSX.utils.sheet_to_json(hoja, { header: 1, defval: "" });
              const resultado = extraerPuntajeDeHoja(matriz);

              totalPObtenido += resultado.pObtenido;
              totalAdicionales += resultado.puntosAdicionales;
              mesesLeidos.push(nombreHoja);
            });

            const equipo = limpiarNombreArchivo(archivo.name);

            resolve({
              equipo,
              archivo: archivo.name,
              logo: obtenerLogoEquipo(equipo),
              pObtenido: totalPObtenido,
              puntosAdicionales: totalAdicionales,
              puntos: totalPObtenido + totalAdicionales,
              mesesLeidos
            });
          } catch (error) {
            reject(error);
          }
        };
        lector.onerror = () => reject(new Error("No se pudo leer el archivo."));
        lector.readAsArrayBuffer(archivo);
      });
    }

    async function procesarExcels() {
      const input = document.getElementById("archivoExcel");
      const archivos = Array.from(input.files);
      if (archivos.length === 0) {
        alert("Primero debes cargar uno o varios archivos Excel.");
        return;
      }

      const resultados = [];
      for (const archivo of archivos) {
        try {
          const resultado = await leerArchivoExcel(archivo);
          if (resultado.puntos > 0) resultados.push(resultado);
        } catch (error) {
          console.error("Error leyendo archivo:", archivo.name, error);
        }
      }

      resultados.sort((a, b) => b.puntos - a.puntos);
      mostrarRanking(resultados);
      moverAguja(resultados);
    }

    function mostrarRanking(ranking) {
      const contenedor = document.getElementById("ranking");
      if (!ranking.length) {
        contenedor.innerHTML = `<div class="sin-datos">No se encontraron puntajes válidos. Revisa que cada hoja tenga C65 y C66 con números.</div>`;
        return;
      }

      contenedor.innerHTML = "";
      ranking.slice(0, 8).forEach((item, index) => {
        const fila = document.createElement("div");
        fila.className = "fila-ranking";
        fila.innerHTML = `
          <div class="posicion posicion-${index + 1}">${index + 1}</div>
          <div class="avatar"><img src="${item.logo}" alt="Logo ${item.equipo}" onerror="this.src='logos/default.png'"></div>
          <div class="nombre-equipo">
            <span>${item.equipo}</span>
            <small>Meses: ${item.mesesLeidos.join(", ")} | C65: ${redondear(item.pObtenido)} | C66: ${redondear(item.puntosAdicionales)}</small>
          </div>
          <div class="puntos">${redondear(item.puntos)}</div>
          <div class="adicionales">+${redondear(item.puntosAdicionales)}</div>
        `;
        contenedor.appendChild(fila);
      });
    }

    function moverAguja(ranking) {
      const aguja = document.getElementById("aguja");
      if (!ranking.length) {
        aguja.style.transform = "rotate(-60deg)";
        return;
      }
      const mayorPuntaje = ranking[0].puntos;
      const meta = Number(document.getElementById("cantidadMeses").value) * 100;
      const porcentaje = Math.min(mayorPuntaje / meta, 1);
      const grados = -60 + porcentaje * 120;
      aguja.style.transform = `rotate(${grados}deg)`;
    }

    function actualizarMetaVisual() {
      const cantidad = Number(document.getElementById("cantidadMeses").value);
      const meta = cantidad * 100;
      document.getElementById("metaTexto").textContent = `${meta} puntos`;
    }

    actualizarMetaVisual();
  </script>
</body>
</html>
