<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Guardianes EHS - Ranking</title>
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
  <style>
    *{box-sizing:border-box}body{margin:0;min-height:100vh;font-family:Arial,Helvetica,sans-serif;background:radial-gradient(circle at top,#18345a 0%,#07111f 55%,#020711 100%);color:#fff}.contenedor{width:100%;min-height:100vh;padding:20px;display:flex;justify-content:center;align-items:center}.panel{width:100%;max-width:900px;background:linear-gradient(180deg,#07162c,#020914);border:4px solid #253a5a;border-radius:14px;padding:24px;box-shadow:0 0 35px rgba(0,0,0,.85),inset 0 0 25px rgba(80,130,200,.25)}.encabezado{text-align:center;padding:15px;border:2px solid #7fa8df;border-radius:10px;background:linear-gradient(180deg,#173e75,#061a39);box-shadow:inset 0 0 18px rgba(173,216,255,.35)}.encabezado h1{margin:0;font-size:clamp(26px,5vw,44px);letter-spacing:7px;color:#f5d86d;text-shadow:0 3px 5px #000}.encabezado h2{margin:6px 0 0;font-size:clamp(17px,3vw,28px);letter-spacing:5px;text-shadow:0 3px 5px #000}.medidor{display:flex;justify-content:center;margin:25px 0 15px}.gauge{width:min(390px,90vw);height:180px;position:relative;overflow:hidden;border-radius:220px 220px 0 0;background:conic-gradient(from 270deg,#39e34a 0deg,#b6ff2f 45deg,#ffdf31 75deg,#ff3228 105deg,#151515 140deg,#151515 180deg);border:8px solid #b8c0d5}.gauge:after{content:"";position:absolute;width:70%;height:70%;background:#e8e8e8;border-radius:180px 180px 0 0;left:15%;bottom:0}.aguja{width:6px;height:125px;background:#e92323;position:absolute;left:50%;bottom:15px;transform-origin:bottom center;transform:rotate(-60deg);z-index:3;border-radius:5px;box-shadow:0 0 6px #000;transition:transform .7s ease}.centro{width:26px;height:26px;background:#222;position:absolute;left:calc(50% - 13px);bottom:4px;border-radius:50%;z-index:4}.zona-carga{display:grid;grid-template-columns:1fr 180px 180px;gap:12px;align-items:center;padding:12px;margin-bottom:15px;border:2px solid #31496d;border-radius:8px;background:#080d1b}.zona-carga input,.zona-carga select{color:#fff;background:#111827;border:1px solid #5f7397;padding:10px;border-radius:6px;width:100%}.zona-carga button{border:none;background:linear-gradient(180deg,#ffe275,#c79522);color:#111;font-weight:900;padding:11px 20px;border-radius:8px;cursor:pointer;text-transform:uppercase;box-shadow:0 3px 0 #72510d}.info{text-align:center;font-size:14px;color:#d8e4ff;margin-bottom:18px;line-height:1.5}.meta{color:#f5d86d;font-weight:bold}.ranking{display:flex;flex-direction:column;gap:12px}.fila-ranking{display:grid;grid-template-columns:55px 55px 1fr 90px 90px;gap:10px;align-items:center}.posicion{width:44px;height:44px;border-radius:50%;display:flex;justify-content:center;align-items:center;background:#202a3b;border:3px solid #fff;font-size:23px;font-weight:bold;box-shadow:inset 0 0 8px #000}.posicion-1{background:#c79a1a}.posicion-2{background:#9ea3ad}.posicion-3{background:#a96324}.logo-equipo{width:48px;height:48px;border-radius:50%;background:radial-gradient(circle,#87e582,#143c38);display:flex;justify-content:center;align-items:center;border:2px solid #90a4c7;overflow:hidden}.logo-equipo img{width:90%;height:90%;object-fit:contain}.nombre-equipo{min-height:46px;background:linear-gradient(180deg,#1b2738,#08111f);border:2px solid #6c7e9e;border-radius:18px;display:flex;flex-direction:column;justify-content:center;padding:5px 18px;font-weight:bold;text-transform:uppercase;box-shadow:inset 0 0 10px #000}.nombre-equipo span{font-size:17px}.nombre-equipo small{font-size:11px;color:#aebfda;margin-top:2px;text-transform:none;font-weight:normal}.puntos{min-height:42px;background:#050914;border:2px solid #6c7e9e;border-radius:14px;display:flex;justify-content:center;align-items:center;font-size:21px;font-weight:bold}.adicionales{min-height:42px;background:linear-gradient(180deg,#ffe178,#c99625);color:#111;border-radius:14px;display:flex;justify-content:center;align-items:center;font-size:21px;font-weight:900;box-shadow:inset 0 0 6px #fff3a0}.sin-datos{text-align:center;padding:35px;color:#b8c8e8;border:2px dashed #4c6388;border-radius:10px}.footer-tabla{margin-top:38px;display:grid;grid-template-columns:1fr 1fr;border:2px solid #8ea1c8;border-radius:6px;padding:14px;text-align:center;font-weight:900;letter-spacing:2px;background:#060d1d}@media(max-width:760px){.panel{padding:15px}.encabezado h1{letter-spacing:3px}.encabezado h2{letter-spacing:2px}.zona-carga{grid-template-columns:1fr}.fila-ranking{grid-template-columns:42px 42px 1fr;grid-template-areas:"pos logo equipo" "pos puntos adicionales";gap:8px;padding-bottom:10px;border-bottom:1px solid #293d5e}.posicion{grid-area:pos;width:38px;height:38px;font-size:19px}.logo-equipo{grid-area:logo;width:38px;height:38px}.nombre-equipo{grid-area:equipo}.nombre-equipo span{font-size:14px}.puntos{grid-area:puntos;min-height:36px;font-size:16px}.adicionales{grid-area:adicionales;min-height:36px;font-size:16px}}
  </style>
</head>
<body>
  <main class="contenedor"><section class="panel">
    <header class="encabezado"><h1>GUARDIANES EHS</h1><h2>MARATÓN EHS</h2></header>
    <section class="medidor"><div class="gauge"><div class="aguja" id="aguja"></div><div class="centro"></div></div></section>
    <section class="zona-carga">
      <input type="file" id="archivoExcel" accept=".xlsx,.xls" multiple>
      <select id="cantidadMeses" onchange="actualizarMetaVisual()"><option value="1">1 mes</option><option value="2">2 meses</option><option value="3">3 meses</option><option value="4" selected>4 meses</option><option value="5">5 meses</option><option value="6">6 meses</option><option value="7">7 meses</option><option value="8">8 meses</option><option value="9">9 meses</option><option value="10">10 meses</option><option value="11">11 meses</option><option value="12">12 meses</option></select>
      <button onclick="procesarExcels()">Actualizar ranking</button>
    </section>
    <div class="info">Lectura desde <strong>FEBRERO</strong>. Meta ranking: <span class="meta" id="metaTexto">400 puntos</span>.<br>Lee cada archivo Excel, revisa cada hoja mensual y suma: <strong>P obtenidos + puntos adicionales</strong>.</div>
    <section class="ranking" id="ranking"><div class="sin-datos">Sube uno o varios archivos Excel para generar el ranking.</div></section>
    <footer class="footer-tabla"><div>EQUIPO</div><div>PUNTOS</div></footer>
  </section></main>
<script>
const MESES_ORDEN=["ENE","FEB","MAR","ABR","MAY","JUN","JUL","AGO","SEP","OCT","NOV","DIC"];const MES_INICIAL="FEB";
function normalizarTexto(v){if(v===null||v===undefined)return"";return String(v).trim().toUpperCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/\s+/g," ")}
function redondear(n){return Math.round((Number(n)+Number.EPSILON)*100)/100}
function limpiarNombreArchivo(n){return n.replace(/\.[^/.]+$/," ").replace(/[_-]/g," ").trim().toUpperCase()}
function obtenerNumero(v){if(v===null||v===undefined||v==="")return null;if(typeof v==="number")return v;const t=String(v).replace(",",".");const m=t.match(/-?\d+(\.\d+)?/);return m?parseFloat(m[0]):null}
function buscarNumeroDerecha(matriz,fila,columna,maxColumnas=8){const total=matriz[fila]?.length||0;for(let c=columna+1;c<Math.min(columna+maxColumnas+1,total);c++){const n=obtenerNumero(matriz[fila][c]);if(n!==null)return n}return 0}
function buscarNumeroCerca(matriz,fila,columna){const totalFilas=matriz.length;const pos=[[fila,columna+1],[fila,columna+2],[fila,columna+3],[fila+1,columna],[fila+1,columna+1],[fila-1,columna+1],[fila+2,columna],[fila+2,columna+1]];for(const [f,c] of pos){if(f<0||f>=totalFilas)continue;const n=obtenerNumero(matriz[f]?.[c]);if(n!==null)return n}return 0}
function extraerPuntajeDeHoja(matriz){let pObtenido=0,puntosAdicionales=0;for(let fila=0;fila<matriz.length;fila++){const columnas=matriz[fila]||[];for(let columna=0;columna<columnas.length;columna++){const texto=normalizarTexto(columnas[columna]);if(!texto)continue;const esPObtenido=texto.includes("P OBTENIDO")||texto.includes("P. OBTENIDO")||texto.includes("P OBTENIDOS")||texto.includes("PUNTOS OBTENIDOS")||texto.includes("PUNTAJE OBTENIDO")||texto.includes("PUNTAJES OBTENIDOS");const esPuntosAdicionales=texto.includes("PUNTOS ADICIONALES")||texto.includes("PUNTO ADICIONAL")||texto.includes("P ADICIONALES")||texto.includes("P. ADICIONALES")||texto.includes("PUNTAJE ADICIONAL")||texto.includes("PUNTAJES ADICIONALES");if(esPObtenido)pObtenido+=buscarNumeroDerecha(matriz,fila,columna);if(esPuntosAdicionales)puntosAdicionales+=buscarNumeroCerca(matriz,fila,columna)}}return{pObtenido,puntosAdicionales,total:pObtenido+puntosAdicionales}}
function obtenerMesesAProcesar(){const cantidad=Number(document.getElementById("cantidadMeses").value);const i=MESES_ORDEN.indexOf(MES_INICIAL);return MESES_ORDEN.slice(i,i+cantidad)}
function detectarMesDeHoja(nombreHoja){const h=normalizarTexto(nombreHoja);if(h.includes("ENERO")||h==="ENE"||h.includes("ENE"))return"ENE";if(h.includes("FEBRERO")||h==="FEB"||h.includes("FEB"))return"FEB";if(h.includes("MARZO")||h==="MAR"||h.includes("MAR"))return"MAR";if(h.includes("ABRIL")||h==="ABR"||h.includes("ABR"))return"ABR";if(h.includes("MAYO")||h==="MAY"||h.includes("MAY"))return"MAY";if(h.includes("JUNIO")||h==="JUN"||h.includes("JUN"))return"JUN";if(h.includes("JULIO")||h==="JUL"||h.includes("JUL"))return"JUL";if(h.includes("AGOSTO")||h==="AGO"||h.includes("AGO"))return"AGO";if(h.includes("SEPTIEMBRE")||h==="SEP"||h.includes("SEP"))return"SEP";if(h.includes("OCTUBRE")||h==="OCT"||h.includes("OCT"))return"OCT";if(h.includes("NOVIEMBRE")||h==="NOV"||h.includes("NOV"))return"NOV";if(h.includes("DICIEMBRE")||h==="DIC"||h.includes("DIC"))return"DIC";return null}
function obtenerHojasValidas(workbook){const meses=obtenerMesesAProcesar();return workbook.SheetNames.filter(nombre=>{const mes=detectarMesDeHoja(nombre);return mes&&meses.includes(mes)})}
async function leerArchivoExcel(archivo){return new Promise((resolve,reject)=>{const lector=new FileReader();lector.onload=e=>{try{const datos=new Uint8Array(e.target.result);const workbook=XLSX.read(datos,{type:"array"});const hojas=obtenerHojasValidas(workbook);let totalP=0,totalA=0,mesesLeidos=[];hojas.forEach(nombreHoja=>{const matriz=XLSX.utils.sheet_to_json(workbook.Sheets[nombreHoja],{header:1,defval:""});const r=extraerPuntajeDeHoja(matriz);totalP+=r.pObtenido;totalA+=r.puntosAdicionales;mesesLeidos.push(nombreHoja)});resolve({equipo:limpiarNombreArchivo(archivo.name),archivo:archivo.name,pObtenido:totalP,puntosAdicionales:totalA,puntos:totalP+totalA,mesesLeidos})}catch(err){reject(err)}};lector.onerror=()=>reject(new Error("No se pudo leer el archivo."));lector.readAsArrayBuffer(archivo)})}
async function procesarExcels(){const archivos=Array.from(document.getElementById("archivoExcel").files);if(archivos.length===0){alert("Primero debes cargar uno o varios archivos Excel.");return}const resultados=[];for(const archivo of archivos){try{const r=await leerArchivoExcel(archivo);if(r.puntos>0)resultados.push(r)}catch(e){console.error("Error leyendo archivo:",archivo.name,e)}}resultados.sort((a,b)=>b.puntos-a.puntos);mostrarRanking(resultados);moverAguja(resultados)}
function obtenerLogoEquipo(nombreEquipo){const n=normalizarTexto(nombreEquipo);if(n.includes("1RX"))return"logos/1rx.png";if(n.includes("CIENTIF"))return"logos/los-cientificos.png";if(n.includes("CAI"))return"logos/cai.png";if(n.includes("CND"))return"logos/cnd.png";if(n.includes("20KG")||n.includes("20 KG"))return"logos/los-20kg.png";if(n.includes("SOLVENTE"))return"logos/solvente.png";if(n.includes("WATER")||n.includes("BASE"))return"logos/water-base.png";if(n.includes("CALIDAD"))return"logos/calidad.png";return"logos/default.png"}
function mostrarRanking(ranking){const c=document.getElementById("ranking");if(!ranking.length){c.innerHTML='<div class="sin-datos">No se encontraron puntajes válidos. Revisa que cada hoja tenga "P obtenidos" y "Puntos adicionales".</div>';return}c.innerHTML="";ranking.slice(0,8).forEach((item,index)=>{const fila=document.createElement("div");fila.className="fila-ranking";fila.innerHTML=`<div class="posicion posicion-${index+1}">${index+1}</div><div class="logo-equipo"><img src="${obtenerLogoEquipo(item.equipo)}" alt="${item.equipo}" onerror="this.src='logos/default.png'"></div><div class="nombre-equipo"><span>${item.equipo}</span><small>Meses: ${item.mesesLeidos.join(", ")} | P obtenidos: ${redondear(item.pObtenido)} | Adicionales: ${redondear(item.puntosAdicionales)}</small></div><div class="puntos">${redondear(item.puntos)}</div><div class="adicionales">+${redondear(item.puntosAdicionales)}</div>`;c.appendChild(fila)})}
function moverAguja(ranking){const aguja=document.getElementById("aguja");if(!ranking.length){aguja.style.transform="rotate(-60deg)";return}const mayor=ranking[0].puntos;const meta=Number(document.getElementById("cantidadMeses").value)*100;const porcentaje=Math.min(mayor/meta,1);const grados=-60+porcentaje*120;aguja.style.transform=`rotate(${grados}deg)`}
function actualizarMetaVisual(){const cantidad=Number(document.getElementById("cantidadMeses").value);document.getElementById("metaTexto").textContent=`${cantidad*100} puntos`}
actualizarMetaVisual();
</script>
</body>
</html>
